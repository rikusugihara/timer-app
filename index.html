<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="timer-mode">
    <div class="container">
        <div class="app">
            <h1 class="title">Timer App</h1>

            <div class="tabs">
                <button id="timerTab" class="tab active">タイマー</button>
                <button id="pomodoroTab" class="tab">ポモドーロ</button>
            </div>

            <div class="inputs">
                <input type="number" id="minutesInput" placeholder="分" min="0">
                <input type="number" id="secondsInput" placeholder="秒" min="0">
            </div>

            <div class="pomodoro-info">
                <p id="modeDisplay">作業</p>
                <p id="sessionCount">セッション: 0</p>
            </div>

            <div class="display-area">
                <p id="timerDisplay" class="time-display">00:00</p>
                <p id="pomodoroDisplay" class="time-display">25:00</p>
            </div>

            <div class="actions">
                <button id="startBtn" class="action-btn start">スタート</button>
                <button id="stopBtn" class="action-btn stop">ストップ</button>
                <button id="resetBtn" class="action-btn reset">リセット</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
