<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
</head>
<body>
    <button id="timerTab">タイマー</button>
    <button id="pomodoroTab">ポモドーロ</button>

    <br>

    <input type="number" id="minutesInput" placeholder="分" min="0">
    <input type="number" id="secondsInput" placeholder="秒" min="0">

    <p id="modeDisplay">作業</p>
    <p id="sessionCount">セッション: 0</p>

    <p id="timerDisplay">00:00:00</p>
    <p id="pomodoroDisplay">25:00:00</p>

    <button id="startBtn">スタート</button>
    <button id="stopBtn">ストップ</button>
    <button id="resetBtn">リセット</button>

    <script src="script.js"></script>
</body>
</html>
